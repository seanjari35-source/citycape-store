<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citycape Store - Notification Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #1a1a1a; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .btn {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn:hover { background-color: #128C7E; }
        #status { margin-top: 15px; font-weight: 500; font-size: 14px; }
        .success { color: #25D366; }
        .error { color: #d9534f; }
    </style>
</head>
<body>

<div class="card">
    <h1>Citycape Store Dashboard</h1>
    <p>Trigger automated customer reminders and confirmation updates instantly over WhatsApp.</p>
    
    <button class="btn" onclick="sendReminder()">Send WhatsApp Notification</button>
    <div id="status"></div>
</div>

<script>
    async function sendReminder() {
        const statusDiv = document.getElementById('status');
        statusDiv.className = '';
        statusDiv.innerText = 'Sending notification... ⏳';
        
        try {
            const response = await fetch('/send-reminder');
            if (response.ok) {
                statusDiv.className = 'success';
                statusDiv.innerText = '🚀 Notification sent to your device successfully!';
            } else {
                statusDiv.className = 'error';
                statusDiv.innerText = '❌ Failed to hand off notification.';
            }
        } catch (error) {
            statusDiv.className = 'error';
            statusDiv.innerText = '❌ Connection error occurred.';
        }
    }
</script>

</body>
</html>
